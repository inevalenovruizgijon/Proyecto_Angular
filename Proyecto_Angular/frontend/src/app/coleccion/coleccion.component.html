<h2>Mi colección</h2>

<div *ngIf="loading" class="alert alert-info">Cargando...</div>
<div *ngIf="error" class="alert alert-danger">{{ error }}</div>

<div *ngIf="!loading && coleccion.length === 0" class="alert alert-warning">
  No tienes cartas en tu colección todavía.
</div>

<ul class="list-group" *ngIf="coleccion.length">
  <li class="list-group-item d-flex align-items-center gap-3" *ngFor="let c of coleccion">
    <img [src]="getCardImg(c.imagen)" width="70" (error)="onImgError($event)" />

    <div class="flex-grow-1">
      <div class="fw-semibold">{{ c.nombre }}</div>
    </div>

    <button (click)="verDetalle(c.carta_id)" class="btn btn-primary btn-sm">Ver detalles</button>
    <div class="text-end me-3" style="min-width: 110px;">
      {{ c.precio ?? 'N/A' }} €
    </div>

    <button class="btn btn-danger btn-sm" (click)="eliminar(c.carta_id)">Quitar</button>
  </li>
</ul>
