<h2>Búsqueda de cartas</h2>

<div class="d-flex gap-2 mb-3">
  <input class="form-control" [(ngModel)]="q" placeholder="Ej: Pikachu" />
  <button class="btn btn-primary" (click)="buscarNueva()">Buscar</button>
</div>

<div *ngIf="loading" class="alert alert-info">Cargando...</div>
<div *ngIf="error" class="alert alert-danger">{{ error }}</div>

<h5 *ngIf="resultados.length">Resultados</h5>
<div *ngIf="!loading && !error && resultados.length == 0" class="alert alert-warning">
  No hay resultados.
</div>

<ul class="list-group" *ngIf="detallesConPrecio.length">
  <li class="list-group-item d-flex align-items-center gap-3" *ngFor="let c of detallesConPrecio">
<img [src]="getCardImg(c.image)" width="70" (error)="onImgError($event)" />
    <div class="flex-grow-1">
      <div class="fw-semibold">{{ c.name }}</div>
      <!-- <div class="text-muted small">{{ c.id }}</div> -->
    </div>
    <a [routerLink]="['/carta', c.id]" class="text-decoration-none">Ver detalles</a>

    <div class="text-end" style="min-width: 110px;">
      {{c.pricing?.cardmarket?.trend ?? 'N/A'}} €
    </div>
  </li>
</ul>

<div class="d-flex justify-content-center gap-2 mt-3" *ngIf="resultados.length">
  <button *ngIf="pagina > 1" class="btn btn-outline-primary" (click)="paginaAnterior()">Anterior</button>
  <span class="align-self-center">Página {{pagina}}</span>

  <button class="btn btn-outline-primary" *ngIf="hayMasResultados" (click)="paginaSiguiente()" [disabled]="loading">Siguiente</button>
</div>
